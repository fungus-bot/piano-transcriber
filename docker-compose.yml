services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - PT_MAX_DURATION_SECONDS=600
    volumes:
      - job-data:/tmp/piano-transcriber-jobs

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  job-data:
